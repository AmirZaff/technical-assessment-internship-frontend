<div class="container mt-5 mb-5">

  <div class="text-center mb-5">
    <h1 class="fw-bold">Angular Contact Form</h1>
    <p class="text-muted">Simple Angular SPA with validation and API integration.</p>
  </div>

  <div class="row justify-content-center">

    <div class="col-md-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">

          <form #contactForm="ngForm" (ngSubmit)="submitForm()">

            <div class="mb-3">
              <label class="form-label">
                Name
              </label>
              <input type="text" class="form-control" name="name" [(ngModel)]="user.name" required #name="ngModel">
              <div class="text-danger mt-1" *ngIf="name.invalid && name.touched">
                Name is required</div>
            </div>

            <div class="mb-3">
              <label class="form-label">
                Email
              </label>
              <input type="email" class="form-control" name="email" [(ngModel)]="user.email" required email #email="ngModel">
              <div class="text-danger mt-1" *ngIf="email.invalid && email.touched">
                Valid email is required</div>
            </div>

            <div class="mb-4">
              <label class="form-label">
                Message
              </label>
              <textarea rows="5" class="form-control" name="message" [(ngModel)]="user.message" required></textarea>
            </div>

            <button type="submit" class="btn btn-dark" [disabled]="contactForm.invalid">
              Submit Form
            </button>

          </form>

        </div>
      </div>
    </div>

  </div>

  <div class="mt-5">

    <div class="text-center mb-4">
      <h2 class="fw-bold">Sample API Data</h2>
      <p class="text-muted">
        Example HTTP request using Angular HttpClient.
      </p>
    </div>

    <div class="row">
      <div class="col-md-6 mb-4" *ngFor="let post of posts">

        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title text-capitalize">{{ post.title }}</h5>
            <p class="card-text text-muted">{{ post.body }}</p>
          </div>
        </div>

      </div>
    </div>

  </div>

</div>
